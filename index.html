<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcolatore Tariffe CRI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print { display: none; } body { background: white; } }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-3 md:p-8 font-sans">

    <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-200">
        <div class="bg-red-600 p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black uppercase tracking-tight">Preventivatore CRI 🚑</h1>
                <p class="text-red-100 text-xs font-bold uppercase tracking-widest">Semplice • Gratuito • Preciso</p>
            </div>
            <button onclick="window.print()" class="no-print bg-white text-red-600 px-4 py-2 rounded-xl font-bold text-xs uppercase shadow-lg">Salva PDF</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2">
            <div class="p-6 space-y-6 border-r border-gray-100">
                
                <div class="space-y-4 bg-gray-50 p-4 rounded-2xl border border-gray-200">
                    <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Configurazione Mezzo</h3>
                    <select id="mezzo" onchange="aggiornaPrezzo()" class="w-full bg-transparent border-b-2 border-gray-300 p-1 font-bold outline-none focus:border-red-500">
                        <option value="amb">Ambulanza (2 Op.)</option>
                        <option value="pul">Pulmino (2 Op.)</option>
                        <option value="aut">Auto (1 Op.)</option>
                    </select>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <select id="ambito" onchange="aggiornaPrezzo()" class="w-full bg-transparent border-b border-gray-300 p-1 text-sm outline-none">
                            <option value="piccolo">Comune < 150k</option>
                            <option value="grande">Città > 150k</option>
                        </select>
                        <select id="tipoViaggio" onchange="aggiornaPrezzo()" class="w-full bg-transparent border-b border-gray-300 p-1 text-sm outline-none">
                            <option value="singola">Sola Andata</option>
                            <option value="ar">Andata e Ritorno</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-3">
                    <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Indirizzi (per Google Maps)</h3>
                    <div id="container-tappe" class="space-y-2">
                        <input type="text" class="tappa-input w-full p-3 border rounded-xl text-sm shadow-sm" placeholder="Partenza (es: Via Roma 1, Milano)">
                        <input type="text" class="tappa-input w-full p-3 border rounded-xl text-sm shadow-sm" placeholder="Arrivo (es: Ospedale Niguarda)">
                    </div>
                    <button onclick="aggiungiTappa()" class="no-print text-red-600 text-[10px] font-bold uppercase hover:underline">+ Aggiungi tappa intermedia</button>
                    
                    <button onclick="apriGoogleMaps()" class="no-print w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg hover:bg-blue-700 transition flex items-center justify-center gap-2">
                        🌐 APRI GOOGLE MAPS PER I KM
                    </button>
                </div>

                <div class="bg-amber-50 p-5 rounded-2xl border-2 border-amber-200">
                    <label class="block text-[10px] font-black text-amber-600 uppercase mb-2 tracking-widest">Inserisci i KM letti su Maps:</label>
                    <div class="flex items-center gap-4">
                        <input type="number" id="km-input" value="0" step="0.1" oninput="aggiornaPrezzo()" class="w-full bg-white border-2 border-amber-400 p-4 rounded-xl text-3xl font-black text-center outline-none focus:ring-4 focus:ring-amber-200">
                        <span class="text-xl font-black text-amber-600 uppercase">KM</span>
                    </div>
                </div>
            </div>

            <div class="p-6 bg-slate-50 flex flex-col justify-center items-center text-center space-y-8">
                <div>
                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-2">Totale Preventivato</p>
                    <div id="totaleDisplay" class="text-7xl font-black text-slate-900 tracking-tighter">€ 0,00</div>
                    <div id="riepilogo-testo" class="text-xs text-slate-400 mt-2 font-medium">Inserisci i chilometri per calcolare</div>
                </div>

                <div class="w-full space-y-3 px-6 no-print">
                    <div class="flex justify-between items-center text-sm">
                        <label class="font-bold text-slate-600">2° Paziente</label>
                        <input type="checkbox" id="paziente2" onchange="aggiornaPrezzo()" class="w-6 h-6 accent-red-600">
                    </div>
                    <div class="flex justify-between items-center text-sm">
                        <label class="font-bold text-slate-600">Minuti Attesa</label>
                        <input type="number" id="attesa" value="0" oninput="aggiornaPrezzo()" class="w-20 border-b-2 bg-transparent text-center font-bold">
                    </div>
                </div>

                <div class="text-[10px] text-slate-300 font-bold uppercase tracking-widest mt-10">
                    Calcolo basato su D.G.R. XII / 437
                </div>
            </div>
        </div>
    </div>

    <script>
        const TARIFFE = {
            amb: { fissa: 54.74, fGr: 58.31, ar: 120.19, arGr: 128.52, km: 1.13, p2: 16.66, att: 41.65 },
            pul: { fissa: 49.98, fGr: 49.98, ar: 116.62, arGr: 110.67, km: 0.95, p2: 14.28, att: 41.65 },
            aut: { fissa: 28.56, fGr: 28.56, ar: 63.07, arGr: 63.07, km: 0.60, p2: 11.90, att: 20.23 }
        };

        function aggiungiTappa() {
            const container = document.getElementById('container-tappe');
            const input = document.createElement('input');
            input.className = "tappa-input w-full p-3 border rounded-xl text-sm shadow-sm";
            input.placeholder = "Tappa intermedia...";
            container.appendChild(input);
        }

        function apriGoogleMaps() {
            const inputs = document.querySelectorAll('.tappa-input');
            const locations = Array.from(inputs).map(i => encodeURIComponent(i.value)).filter(v => v !== "");
            
            if (locations.length < 2) {
                alert("Inserisci almeno Partenza e Arrivo!");
                return;
            }

            // Costruisce il link per Google Maps con più tappe
            const origin = locations[0];
            const destination = locations[locations.length - 1];
            const waypoints = locations.slice(1, -1).join('|');
            
            let url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}`;
            if (waypoints) url += `&waypoints=${waypoints}`;
            
            window.open(url, '_blank');
        }

        function aggiornaPrezzo() {
            const m = document.getElementById('mezzo').value;
            const amb = document.getElementById('ambito').value;
            const tip = document.getElementById('tipoViaggio').value;
            const p2 = document.getElementById('paziente2').checked;
            const attMin = parseInt(document.getElementById('attesa').value) || 0;
            const km = parseFloat(document.getElementById('km-input').value) || 0;

            const t = TARIFFE[m];

            // Calcolo Base
            let base = (tip === 'ar') ? (amb === 'grande' ? t.arGr : t.ar) : (amb === 'grande' ? t.fGr : t.fissa);
            
            // Calcolo Attesa (60 o 90 min franchigia)
            let soglia = (tip === 'ar') ? 90 : 60;
            let oreAttesa = Math.ceil(Math.max(0, attMin - soglia) / 60);

            let totale = base + (km * t.km) + (oreAttesa * t.att) + (p2 ? t.p2 : 0);

            document.getElementById('totaleDisplay').innerText = `€ ${totale.toLocaleString('it-IT', {minimumFractionDigits: 2})}`;
            document.getElementById('riepilogo-testo').innerText = `${km} km • ${oreAttesa} ore attesa extra`;
        }
    </script>
</body>
</html>
