<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcolatore CRI - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 350px; border-radius: 12px; z-index: 1; border: 2px solid #e2e8f0; }
        @media print { .no-print { display: none; } body { background: white; } }
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden">
        <div class="bg-red-600 p-6 text-white flex justify-between items-center">
            <h1 class="text-2xl font-black uppercase tracking-tighter">Calcolatore Trasporti 🚑</h1>
            <div class="text-xs bg-white/20 px-3 py-1 rounded-full font-mono">Ver. 2.5 - OpenSource</div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2">
            <div class="p-6 space-y-6 border-r border-gray-100">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Tipo Mezzo</label>
                        <select id="mezzo" class="w-full border-b-2 p-2 outline-none focus:border-red-500">
                            <option value="amb">Ambulanza (2 Op.)</option>
                            <option value="pul">Pulmino (2 Op.)</option>
                            <option value="aut">Auto (1 Op.)</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Ambito</label>
                        <select id="ambito" class="w-full border-b-2 p-2 outline-none focus:border-red-500">
                            <option value="piccolo">Comune < 150k</option>
                            <option value="grande">Città > 150k</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Tratta</label>
                        <select id="tipoViaggio" class="w-full border-b-2 p-2 outline-none focus:border-red-500">
                            <option value="singola">Sola Andata</option>
                            <option value="ar">Andata e Ritorno</option>
                        </select>
                    </div>
                </div>

                <hr>

                <div>
                    <h3 class="text-sm font-bold text-gray-700 mb-3">PUNTI DI TRASPORTO</h3>
                    <div id="punti-container" class="space-y-3">
                        </div>
                    <button onclick="aggiungiPunto()" class="mt-4 text-xs font-bold text-red-600 uppercase no-print">+ Aggiungi Tappa</button>
                </div>

                <div class="bg-slate-50 p-4 rounded-2xl space-y-3 no-print">
                    <button id="btnCalcola" onclick="eseguiCalcolo()" class="w-full bg-red-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-red-700 transition transform active:scale-95">
                        📍 CALCOLA PERCORSO E TARIFFE
                    </button>
                </div>
            </div>

            <div class="p-6 bg-slate-50 flex flex-col h-full">
                <div id="map" class="no-print mb-6"></div>

                <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-200 mt-auto text-center">
                    <p class="text-gray-400 text-[10px] font-bold uppercase tracking-widest mb-2">Totale Preventivo</p>
                    <div id="totaleDisplay" class="text-6xl font-black text-gray-900 tracking-tighter mb-4">€ 0,00</div>
                    
                    <div class="flex justify-center gap-4 text-sm mb-6">
                        <div class="bg-red-50 text-red-600 px-4 py-1 rounded-full font-bold" id="kmDisplay">0.0 km</div>
                        <div class="bg-gray-100 text-gray-600 px-4 py-1 rounded-full font-bold">DGR XII/437</div>
                    </div>

                    <div class="grid grid-cols-2 gap-2 no-print">
                        <button onclick="window.print()" class="bg-gray-800 text-white py-3 rounded-xl font-bold text-xs uppercase tracking-widest">Stampa PDF</button>
                        <button onclick="location.reload()" class="border border-gray-300 py-3 rounded-xl font-bold text-xs uppercase tracking-widest">Nuovo</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const TARIFFE = {
            amb: { base: 54.74, baseGr: 58.31, ar: 120.19, arGr: 128.52, km: 1.13 },
            pul: { base: 49.98, baseGr: 49.98, ar: 116.62, arGr: 110.67, km: 0.95 },
            aut: { base: 28.56, baseGr: 28.56, ar: 63.07, arGr: 63.07, km: 0.60 }
        };

        const map = L.map('map').setView([45.4642, 9.1900], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let punti = [];
        let markers = [];
        let routeLine = null;

        function aggiungiPunto() {
            const id = Date.now();
            const container = document.getElementById('punti-container');
            const div = document.createElement('div');
            div.className = "flex gap-2 items-center bg-white border p-3 rounded-xl shadow-sm";
            div.innerHTML = `
                <div class="text-xs font-bold text-gray-300">${punti.length + 1}</div>
                <input type="text" id="input-${id}" placeholder="Via, Città..." class="flex-grow outline-none text-sm font-medium">
                ${punti.length > 1 ? `<button onclick="this.parentElement.remove(); punti=punti.filter(p=>p.id!==${id});" class="text-red-300 hover:text-red-500">✕</button>` : ''}
            `;
            container.appendChild(div);
            punti.push({ id, coords: null });
        }

        async function eseguiCalcolo() {
            const btn = document.getElementById('btnCalcola');
            btn.innerText = "RICERCA IN CORSO...";
            btn.classList.add('loading');

            // 1. Geocodifica tutti gli indirizzi inseriti
            for (let p of punti) {
                const val = document.getElementById(`input-${p.id}`).value;
                if (val && !p.coords) {
                    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(val)}`);
                    const data = await res.json();
                    if (data.length > 0) {
                        p.coords = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
                    }
                }
            }

            // 2. Disegna Marker e calcola Percorso
            renderMarkers();
            await calcolaPercorso();

            btn.innerText = "📍 CALCOLA PERCORSO E TARIFFE";
            btn.classList.remove('loading');
        }

        function renderMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            punti.forEach(p => {
                if (p.coords) {
                    const m = L.marker([p.coords.lat, p.coords.lng]).addTo(map);
                    markers.push(m);
                }
            });
            if (markers.length > 1) {
                const group = new L.featureGroup(markers);
                map.fitBounds(group.getBounds().pad(0.2));
            }
        }

        async function calcolaPercorso() {
            const valid = punti.filter(p => p.coords);
            if (valid.length < 2) return alert("Inserisci almeno due indirizzi validi!");

            let totalKm = 0;
            if (routeLine) map.removeLayer(routeLine);

            for (let i = 0; i < valid.length - 1; i++) {
                const p1 = valid[i].coords;
                const p2 = valid[i+1].coords;
                const url = `https://router.project-osrm.org/route/v1/driving/${p1.lng},${p1.lat};${p2.lng},${p2.lat}?overview=full&geometries=geojson`;
                
                const response = await fetch(url);
                const data = await response.json();
                if (data.routes && data.routes[0]) {
                    totalKm += data.routes[0].distance / 1000;
                    routeLine = L.geoJSON(data.routes[0].geometry, { style: { color: '#ef4444', weight: 6, opacity: 0.8 } }).addTo(map);
                }
            }

            aggiornaTariffa(totalKm);
        }

        function aggiornaTariffa(km) {
            const m = document.getElementById('mezzo').value;
            const ambito = document.getElementById('ambito').value;
            const tipo = document.getElementById('tipoViaggio').value;
            const t = TARIFFE[m];

            let base = (tipo === 'ar') ? (ambito === 'grande' ? t.arGr : t.ar) : (ambito === 'grande' ? t.baseGr : t.base);
            let totale = base + (km * t.km);

            document.getElementById('totaleDisplay').innerText = `€ ${totale.toLocaleString('it-IT', {minimumFractionDigits: 2})}`;
            document.getElementById('kmDisplay').innerText = `${km.toFixed(1)} km rilevati`;
        }

        // Inizializza con 2 punti (Partenza e Arrivo)
        aggiungiPunto();
        aggiungiPunto();
    </script>
</body>
</html>
