<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcolatore CRI - Campi Vincolati</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 300px; border-radius: 12px; z-index: 1; border: 1px solid #ddd; }
        @media print { .no-print { display: none; } body { background: white; } }
        .tappa-box { border-left: 4px solid #ef4444; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4">

    <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden border border-gray-200">
        <div class="bg-red-600 p-5 text-white flex justify-between items-center">
            <h1 class="text-xl font-bold uppercase tracking-tight">Calcolatore Trasporti 🚑</h1>
            <span class="text-[10px] bg-white text-red-600 px-2 py-1 rounded font-bold uppercase">DGR XII/437</span>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2">
            <div class="p-6 space-y-6 border-r">
                
                <div class="grid grid-cols-2 gap-4 bg-gray-50 p-4 rounded-xl">
                    <div class="col-span-2">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Mezzo</label>
                        <select id="mezzo" class="w-full bg-transparent border-b border-gray-300 p-1 outline-none focus:border-red-500">
                            <option value="amb">Ambulanza (2 Op.)</option>
                            <option value="pul">Pulmino (2 Op.)</option>
                            <option value="aut">Auto (1 Op.)</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Ambito</label>
                        <select id="ambito" class="w-full bg-transparent border-b border-gray-300 p-1 outline-none focus:border-red-500">
                            <option value="piccolo">Comune < 150k</option>
                            <option value="grande">Città > 150k / S. Raffaele</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Tipo</label>
                        <select id="tipoViaggio" class="w-full bg-transparent border-b border-gray-300 p-1 outline-none focus:border-red-500">
                            <option value="singola">Sola Andata</option>
                            <option value="ar">Andata e Ritorno</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-4">
                    <h3 class="text-xs font-black text-gray-500 uppercase tracking-widest">Percorso (Inserisci i dati)</h3>
                    <div id="punti-container" class="space-y-6">
                        </div>
                    <button onclick="aggiungiPunto()" class="no-print text-red-600 text-xs font-bold hover:underline">+ AGGIUNGI DESTINAZIONE</button>
                </div>

                <button onclick="eseguiCalcolo()" class="no-print w-full bg-red-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-red-700 transition">
                    📍 CALCOLA PERCORSO E PREZZO
                </button>
            </div>

            <div class="p-6 bg-slate-50 flex flex-col justify-between">
                <div id="map" class="no-print mb-6"></div>

                <div class="bg-white p-6 rounded-2xl shadow-inner border text-center">
                    <p class="text-gray-400 text-[10px] font-bold uppercase mb-2">Totale Stimato</p>
                    <div id="totaleDisplay" class="text-6xl font-black text-gray-900 mb-2">€ 0,00</div>
                    <div id="kmDisplay" class="text-red-600 font-bold text-sm mb-6 uppercase tracking-tighter">0.0 km rilevati</div>
                    
                    <div class="flex gap-2 no-print">
                        <button onclick="window.print()" class="flex-1 bg-gray-800 text-white py-3 rounded-lg font-bold text-xs uppercase">Stampa</button>
                        <button onclick="location.reload()" class="flex-1 border py-3 rounded-lg font-bold text-xs uppercase text-gray-400">Reset</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const TARIFFE = {
            amb: { base: 54.74, baseGr: 58.31, ar: 120.19, arGr: 128.52, km: 1.13 },
            pul: { base: 49.98, baseGr: 49.98, ar: 116.62, arGr: 110.67, km: 0.95 },
            aut: { base: 28.56, baseGr: 28.56, ar: 63.07, arGr: 63.07, km: 0.60 }
        };

        const map = L.map('map').setView([45.4642, 9.1900], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let punti = [];
        let markers = [];
        let routeLine = null;

        function aggiungiPunto() {
            const id = Date.now();
            const container = document.getElementById('punti-container');
            const num = punti.length + 1;
            const div = document.createElement('div');
            div.className = "tappa-box bg-white p-4 rounded-lg shadow-sm space-y-3 relative";
            div.innerHTML = `
                <div class="text-[10px] font-bold text-red-600 uppercase mb-2 italic underline">${num === 1 ? 'Partenza (Sede/Paziente)' : 'Destinazione'}</div>
                <div class="grid grid-cols-4 gap-2">
                    <input type="text" id="city-${id}" placeholder="Città" class="col-span-2 border-b p-1 text-sm outline-none focus:border-red-500">
                    <input type="text" id="street-${id}" placeholder="Via/Piazza" class="col-span-1 border-b p-1 text-sm outline-none focus:border-red-500">
                    <input type="text" id="civic-${id}" placeholder="Civ." class="col-span-1 border-b p-1 text-sm outline-none focus:border-red-500 text-center">
                </div>
                ${punti.length > 1 ? `<button onclick="rimuoviPunto(${id}, this.parentElement)" class="absolute top-2 right-2 text-gray-300 hover:text-red-500">✕</button>` : ''}
            `;
            container.appendChild(div);
            punti.push({ id, coords: null });
        }

        function rimuoviPunto(id, el) {
            el.remove();
            punti = punti.filter(p => p.id !== id);
        }

        async function eseguiCalcolo() {
            let errorFound = false;
            
            // Per ogni punto, costruiamo la stringa e cerchiamo le coordinate
            for (let p of punti) {
                const city = document.getElementById(`city-${p.id}`).value;
                const street = document.getElementById(`street-${p.id}`).value;
                const civic = document.getElementById(`civic-${p.id}`).value;

                if (!city || !street) {
                    alert("Città e Via sono obbligatori per ogni tappa!");
                    return;
                }

                // Costruiamo la query "pulita" per Nominatim
                const query = `${street} ${civic}, ${city}, Italia`;
                
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
                    const data = await res.json();
                    
                    if (data && data.length > 0) {
                        p.coords = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
                    } else {
                        alert(`Non trovo l'indirizzo: ${query}. Prova a scriverlo meglio.`);
                        errorFound = true;
                        break;
                    }
                } catch (e) {
                    console.error(e);
                }
            }

            if (!errorFound) {
                renderMarkers();
                await calcolaPercorso();
            }
        }

        function renderMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            punti.forEach(p => {
                if (p.coords) {
                    const m = L.marker([p.coords.lat, p.coords.lng]).addTo(map);
                    markers.push(m);
                }
            });
            if (markers.length > 0) {
                const group = new L.featureGroup(markers);
                map.fitBounds(group.getBounds().pad(0.3));
            }
        }

        async function calcolaPercorso() {
            const valid = punti.filter(p => p.coords);
            if (valid.length < 2) return;

            let totalKm = 0;
            if (routeLine) map.removeLayer(routeLine);

            for (let i = 0; i < valid.length - 1; i++) {
                const p1 = valid[i].coords;
                const p2 = valid[i+1].coords;
                const url = `https://router.project-osrm.org/route/v1/driving/${p1.lng},${p1.lat};${p2.lng},${p2.lat}?overview=full&geometries=geojson`;
                
                const response = await fetch(url);
                const data = await response.json();
                if (data.routes && data.routes[0]) {
                    totalKm += data.routes[0].distance / 1000;
                    routeLine = L.geoJSON(data.routes[0].geometry, { style: { color: '#ef4444', weight: 6 } }).addTo(map);
                }
            }
            aggiornaPrezzo(totalKm);
        }

        function aggiornaPrezzo(km) {
            const m = document.getElementById('mezzo').value;
            const ambito = document.getElementById('ambito').value;
            const tipo = document.getElementById('tipoViaggio').value;
            const t = TARIFFE[m];

            let base = (tipo === 'ar') ? (ambito === 'grande' ? t.arGr : t.ar) : (ambito === 'grande' ? t.baseGr : t.base);
            let totale = base + (km * t.km);

            document.getElementById('totaleDisplay').innerText = `€ ${totale.toLocaleString('it-IT', {minimumFractionDigits: 2})}`;
            document.getElementById('kmDisplay').innerText = `${km.toFixed(1)} km calcolati`;
        }

        aggiungiPunto();
        aggiungiPunto();
    </script>
</body>
</html>
